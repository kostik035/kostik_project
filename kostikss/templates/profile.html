{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="card-body">
        <h3>{{ profile_user.username }}</h3>
        <p>Роль: {{ profile_user.role }}</p>
        <p>Завершено заказов: {{ profile_user.completed_orders }}</p>
        {% if profile_user.bio %}
        <p>{{ profile_user.bio }}</p>
        {% endif %}
    </div>
</div>
{% endblock %}
